<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unlimited Colours</title>
  </head>
  <body>
    <h3>Start should change the Background Colour every second</h3>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
    <script>
        let intId;
      const randomColor = function () {
        const hex = "0123456789ABCDEF";
        let color = "#";
        for (i = 0; i < 6; i++) {
          color += hex[Math.floor(Math.random() * 16)];
        }
        return color;
      };
      
      const startChangingColor = function(){
        clearInterval(intId);
        intId = setInterval(changeBgColor,1000)
        function changeBgColor (){
            document.body.style.backgroundColor=randomColor();
            console.log(randomColor(),' created at ',Date.now());
        }
        console.log("Start Clicked");
        
      }

      const stopChangingColor =function(){
        clearInterval(intId)
        intId = document.body.style.backgroundColor='white';
        intId = null;
        console.log("Stop Clicked");
        
      }

      document.getElementById('start').addEventListener('click',startChangingColor);
      document.getElementById('stop').addEventListener('click',stopChangingColor);
    </script>
  </body>
</html>
