<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <p>Try Guessing The Number Between 1 and 100</p>
    <p id="attempts">You have 10 attempts remaining...</p>

    <h2>Guess The Number!</h2>
    <input type="number" id="guessInput" placeholder="Enter your guess">
    <button onclick="checkGuess()">Submit Guess</button>
    <p id="message"></p>
    
    <script>
        const randomNumber = Math.floor(Math.random() * 100) + 1;
        console.log(randomNumber);
        
        let atmpts =10;

        function checkGuess(){
            const guess = parseInt(document.getElementById('guessInput').value);
            const message  = document.getElementById('message');
            if(isNaN(guess)||guess<1||guess>100){
                message.textContent = 'Please enter a valid number between 1 and 100.';
                return;
            }
            atmpts--;
            if(guess === randomNumber){
                message.textContent = 'Congratulations! You guessed the number!';
            }
            else if(guess <randomNumber){
                message.textContent = 'The number is higher than your guess.';
            }
            else{
                message.textContent = 'The number is lower than your guess.';
            }
            if(atmpts >0){
                document.getElementById('attempts').textContent = `You have ${atmpts} attempts remaining...`;
            }
            else{
                message.textContent += ` Game Over! The number was ${randomNumber}.`;
                document.getElementById('attempts').textContent = 'No attempts left.';
        }}
    </script>
</body>
</html>
